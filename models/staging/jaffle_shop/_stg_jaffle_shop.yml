models:
  - name: stg_jaffle_shop__customers
    description: One unique customer per row
    columns:
      - name: customer_id
        description: The primary key of the table
        data_tests:
          - unique
          - not_null
  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: The primary key of the table
        data_tests:
          - unique
          - not_null
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: 
                  - completed
                  - shipped
                  - placed
                  - return_pending
                  - returned
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id